<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memoranda</title>
    <meta name="theme-color" content="#2f6fed" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232f6fed'/%3E%3Cpath d='M18 20h28v24H18z' fill='white'/%3E%3Cpath d='M24 28h16M24 36h12' stroke='%232f6fed' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero card">
        <h1>Memoranda</h1>
        <p class="subtitle">Ricorda dove hai messo ogni oggetto.</p>
      </header>

      <section class="card">
        <h2 id="form-title">Aggiungi oggetto</h2>
        <form id="item-form">
          <div class="form-row">
            <label for="name">Nome oggetto</label>
            <input id="name" name="name" type="text" placeholder="es. Chiavi" required />
          </div>

          <div class="form-row">
            <label for="room">Stanza</label>
            <input id="room" name="room" type="text" placeholder="es. Cucina" list="room-suggestions" autocomplete="off" required />
            <datalist id="room-suggestions"></datalist>
          </div>

          <div class="form-row">
            <label for="container">Contenitore</label>
            <input id="container" name="container" type="text" placeholder="es. Cassetto in alto" list="container-suggestions" autocomplete="off" required />
            <datalist id="container-suggestions"></datalist>
          </div>


          <div class="form-row">
            <label for="image">Immagine (opzionale)</label>
            <input id="image" name="image" type="file" accept="image/*" />
          </div>

          <div class="form-actions">
            <button id="submit-btn" type="submit">Salva</button>
            <button id="cancel-edit-btn" type="button" class="btn-secondary hidden">Annulla modifica</button>
          </div>
        </form>
        <p id="feedback" class="feedback" aria-live="polite"></p>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>Oggetti salvati</h2>
          <div class="list-actions">
            <button id="export-btn" type="button" class="btn-secondary">Esporta backup</button>
            <button id="import-btn" type="button" class="btn-secondary">Importa backup</button>
            <input id="import-file" type="file" accept="application/json" class="hidden" />
            <button id="refresh-btn" type="button">Aggiorna</button>
          </div>
        </div>
        <div class="search-row">
          <label for="search-input">Cerca per nome</label>
          <input id="search-input" type="text" placeholder="Scrivi il nome di un oggetto" />
        </div>
        <div class="search-row">
          <label for="room-filter">Filtra per stanza</label>
          <select id="room-filter">
            <option value="">Tutte</option>
          </select>
        </div>
        <ul id="items-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
